<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assignment 2 — AII006 | Miracle Chenda</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f2f2f2;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #9ca3af;
        --accent: #35c2c1;
        --line: #e5e7eb;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Poppins", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
      }
      .card {
        width: min(1000px, 100%);
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08);
        padding: 40px 56px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
      }
      .logo {
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .logo span {
        color: var(--accent);
      }
      .back-link {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
      }
      .back-link:hover {
        color: var(--text);
      }
      .section {
        padding: 24px 0;
        border-top: 1px solid var(--line);
      }
      .section:first-of-type {
        border-top: none;
        padding-top: 0;
      }
      .section h3 {
        font-size: 1.4rem;
        margin-bottom: 12px;
      }
      .muted {
        color: var(--muted);
      }
      .assignment-header {
        margin-bottom: 24px;
      }
      .assignment-header .course-tag {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 10px;
      }
      .assignment-header h1 {
        font-size: 2rem;
        margin-bottom: 6px;
      }
      .assignment-header p {
        color: var(--muted);
      }
      .download-box {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
        background: #fafafa;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .download-box .file-info {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .download-box .file-icon {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 0.8rem;
        flex-shrink: 0;
      }
      .download-box .file-name {
        font-weight: 600;
        margin-bottom: 2px;
      }
      .download-box .file-meta {
        font-size: 0.85rem;
        color: var(--muted);
      }
      .btn-download {
        background: var(--accent);
        color: #ffffff;
        padding: 10px 20px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 600;
        display: inline-block;
        white-space: nowrap;
      }
      .btn-download:hover {
        opacity: 0.9;
      }
      footer {
        margin-top: 28px;
        text-align: center;
        font-size: 0.85rem;
        color: var(--muted);
      }
      @media (max-width: 800px) {
        .card {
          padding: 32px 24px;
        }
        .topbar {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .download-box {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <header class="topbar">
          <div class="logo">resum<span>.</span></div>
          <a class="back-link" href="index.html">← Back to Portfolio</a>
        </header>

        <div class="section" style="border-top:none; padding-top:0;">
          <div class="assignment-header">
            <span class="course-tag">AII006</span>
            <h1>Assignment 2 — Homework 2</h1>
            <p>Miracle Chenda &nbsp;·&nbsp; AII006 Course</p>
          </div>

          <div class="section">
            <h3>Download Assignment</h3>
            <p class="muted" style="margin-bottom:16px;">
              Click the button below to download the Assignment 2 document.
            </p>
            <div class="download-box">
              <div class="file-info">
                <div class="file-icon">DOCX</div>
                <div>
                  <div class="file-name">AII 006 hmw 2.docx</div>
                  <div class="file-meta">Assignment 2 · Homework 2 document</div>
                </div>
              </div>
              <a class="btn-download" href="AII%20006%20hmw%202.docx" download>
                ⬇ Download
              </a>
            </div>
          </div>
        </div>

        <footer>© 2026 Miracle Chenda. Crafted with care.</footer>
      </div>
    </div>
  </body>
</html>
